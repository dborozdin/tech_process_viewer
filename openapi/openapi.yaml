          type: array
        total:
          description: Total number of types
          type: integer
      type: object
    ResourceUpdate:
      properties:
        object_id:
          description: Resource object system ID
          nullable: true
          type: integer
        unit_id:
          description: Unit system ID
          nullable: true
          type: integer
        value_component:
          description: Resource quantity/value
          nullable: true
          type: number
      type: object
  securitySchemes:
    SessionKey:
      description: Session key obtained from /api/connect endpoint
      in: header
      name: X-APL-SessionKey
      type: apiKey
info:
  contact:
    name: API Support
  description: REST API for managing technical processes, products, documents, and
    resources in the PSS application
  license:
    name: Proprietary
  title: Tech Process Viewer API
  version: v1
openapi: 3.0.3
paths:
  /api/connect:
    post:
      description: 'Connect to PSS database and obtain a session key.


        **Usage:**

        1. Call this endpoint with connection parameters

        2. Copy the `session_key` from the response

        3. Click "Authorize" button in Swagger UI

        4. Paste the session_key into the value field

        5. All subsequent API calls will use this session key


        **Default values** will connect to local development database.'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectResponse'
          description: OK
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_ENTITY'
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Connection failed
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      security: []
      summary: Connect to PSS database
      tags:
      - auth
  /api/dblist:
    get:
      description: Get list of available databases from PSS server. No authentication
        required.
      responses:
        default:
