components:
  responses:
    DEFAULT_ERROR:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Default error response
    UNPROCESSABLE_ENTITY:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Unprocessable Entity
  schemas:
    BOMItem:
      properties:
        attributes:
          $ref: '#/components/schemas/BOMItemAttributes'
        id:
          description: BOM item system ID
          type: integer
        type:
          description: Entity type
          type: string
      required:
      - id
      type: object
    BOMItemAttributes:
      properties:
        reference_designator:
          description: Component designation (e.g., R1, C2)
          type: string
        related_product_definition:
          additionalProperties: {}
          description: Child product definition (component)
          type: object
        relating_product_definition:
          additionalProperties: {}
          description: Parent product definition
          type: object
        unit_component:
          additionalProperties: {}
          description: Unit of measurement
          type: object
        value_component:
          description: Quantity
          type: number
      type: object
    BOMItemCreate:
      properties:
        component_id:
          description: Component product definition ID
          type: integer
        quantity:
          description: Quantity
          type: number
        reference_designator:
          description: Reference designator (e.g., R1, C2)
          type: string
        unit_id:
          description: Unit of measurement ID
          type: integer
      required:
      - component_id
      - quantity
      type: object
    BOMItemUpdate:
      properties:
        quantity:
          description: Quantity
          type: number
        reference_designator:
          description: Reference designator
          type: string
        unit_id:
          description: Unit of measurement ID
          type: integer
      type: object
    BOMResponse:
      properties:
        bom_item_id:
          description: BOM item ID
          type: integer
        data:
          allOf:
          - $ref: '#/components/schemas/BOMItem'
          description: BOM item data
        message:
          description: Response message
          type: string
        success:
          description: Operation success
          type: boolean
      required:
      - success
      type: object
    BOMStructure:
      properties:
        components:
          description: List of components
          items:
            $ref: '#/components/schemas/BOMItem'
          type: array
        product_definition_id:
          description: Product definition ID
          type: integer
        product_name:
          description: Product name
          type: string
        total_components:
          description: Total number of components
          type: integer
      required:
      - product_definition_id
      type: object
    BusinessProcess:
      properties:
        access:
          description: Access level
          type: string
        attributes:
          $ref: '#/components/schemas/BusinessProcessAttributes'
        id:
          description: System ID
          type: integer
        type:
          description: Entity type
          type: string
      required:
      - attributes
      - id
      - type
      type: object
    BusinessProcessAttributes:
      properties:
        customized:
          description: Whether process is customized
          type: boolean
        description:
          default: ''
          description: Process description
          type: string
        elements:
          description: Sub-processes/phases
          items:
            $ref: '#/components/schemas/BusinessProcessElement'
          type: array
        id:
          description: Business process ID (business key)
          type: string
        name:
          description: Process name
          type: string
        resources:
          description: Process resources
          items:
            $ref: '#/components/schemas/BusinessProcessResourceReference'
          type: array
        type:
          allOf:
          - $ref: '#/components/schemas/BusinessProcessType'
          description: Process type reference
      required:
      - name
      type: object
    BusinessProcessCreate:
      properties:
        customized:
          default: false
          description: Whether process is customized
          type: boolean
        description:
          default: ''
          description: Process description
          type: string
        id:
          description: Business process ID (optional, will be generated if not provided)
          type: string
        name:
          description: Process name
          type: string
        parent_id:
          description: Parent process ID (if this is a sub-process)
          type: integer
        type_id:
          description: Process type system ID
          type: integer
      required:
      - name
      type: object
    BusinessProcessDetail:
      properties:
        customized:
          description: Whether process is customized
          type: boolean
        description:
          description: Process description
          type: string
        documents:
          description: Related documents
          items:
            additionalProperties: {}
            type: object
          type: array
        elements:
          description: Sub-processes
          items:
            $ref: '#/components/schemas/BusinessProcessListItem'
          type: array
        name:
          description: Process name
          type: string
        org_unit:
          description: Organizational unit
          type: string
        process_id:
          description: Process system ID
          type: integer
        process_type:
          description: Process type (Typical/Customized)
          type: string
        resources:
          description: Process resources
          items:
            additionalProperties: {}
            type: object
          type: array
      required:
      - name
      - process_id
      type: object
    BusinessProcessElement:
      properties:
        id:
          description: Element system ID
          type: integer
        type:
          description: Element type
          type: string
      required:
      - id
      type: object
    BusinessProcessElementCreate:
      properties:
        element_id:
          description: ID of existing process to add as sub-element
          type: integer
      required:
      - element_id
      type: object
    BusinessProcessListItem:
      properties:
        customized:
          description: Whether process is customized
          type: boolean
        description:
          description: Process description
          type: string
        name:
          description: Process name
          type: string
        org_unit:
          description: Organizational unit
          type: string
        process_id:
          description: Process system ID
          type: integer
        process_type:
          description: Process type (Typical/Customized)
          type: string
      required:
      - name
      - process_id
      type: object
    BusinessProcessListResponse:
      properties:
        page:
          description: Current page
          type: integer
        per_page:
          description: Items per page
          type: integer
        processes:
          items:
            $ref: '#/components/schemas/BusinessProcessListItem'
          type: array
        total:
          description: Total number of processes
          type: integer
      required:
      - processes
      type: object
    BusinessProcessResourceCreate:
      properties:
        object_id:
          description: Object ID (organization, product, etc.)
          type: integer
        type_id:
          description: Resource type ID
          type: integer
        unit_id:
          description: Unit of measurement ID
          type: integer
        value_component:
          description: Resource value (e.g., time in hours)
          type: number
      required:
      - type_id
      type: object
    BusinessProcessResourceReference:
      properties:
        id:
          description: Resource system ID
          type: integer
        type:
          description: Resource type
          type: string
      required:
      - id
      type: object
    BusinessProcessResourceUpdate:
      properties:
        object_id:
          description: Object ID
          type: integer
        unit_id:
          description: Unit ID
          type: integer
        value_component:
          description: Resource value
          type: number
      type: object
    BusinessProcessResponse:
      properties:
        data:
          allOf:
          - $ref: '#/components/schemas/BusinessProcess'
          description: Business process data
        message:
          description: Response message
          type: string
        process_id:
          description: Created/updated process ID
          type: integer
        success:
          description: Operation success
          type: boolean
      required:
      - success
      type: object
    BusinessProcessType:
      properties:
        id:
          description: Process type ID
          type: integer
        name:
          description: Process type name
          type: string
      required:
      - id
      type: object
    BusinessProcessUpdate:
      properties:
        customized:
          description: Whether process is customized
          type: boolean
        description:
          description: Process description
          type: string
        name:
          description: Process name
          type: string
        type_id:
          description: Process type system ID
          type: integer
      type: object
    ConnectRequest:
      properties:
        db:
          default: pss_moma_08_07_2025
          description: Database name to connect to
          type: string
        password:
          default: ''
          description: Password (optional, not used in current implementation)
          type: string
        server_port:
          default: http://localhost:7239
          description: PSS server URL (e.g., http://localhost:7239)
          type: string
        user:
          default: Administrator
          description: Username for authentication
          type: string
      type: object
    ConnectResponse:
      properties:
        connected:
          description: Connection status
          type: boolean
        db:
          description: Connected database name
          type: string
        session_key:
          description: Session key for X-APL-SessionKey header
          type: string
        user:
          description: Connected user
          type: string
      type: object
    DisconnectResponse:
      properties:
        disconnected:
          description: Disconnection status
          type: boolean
        message:
          description: Status message
          type: string
      type: object
    Document:
      properties:
        customized:
          description: Whether document is customized
          nullable: true
          type: boolean
        description:
          description: Document description
          nullable: true
          type: string
        id:
          description: Document ID
          type: string
        kind:
          allOf:
          - $ref: '#/components/schemas/Reference'
          description: Document kind/type reference
          nullable: true
        name:
          description: Document name
          type: string
        status:
          description: Document status
          nullable: true
          type: string
        version_id:
          description: Version identifier
          nullable: true
          type: string
      type: object
    DocumentCreate:
      properties:
        description:
          description: Document description
          nullable: true
          type: string
        id:
          description: Document ID
          type: string
        kind_id:
          description: Document kind/type sys_id
          nullable: true
          type: integer
        name:
          description: Document name
          type: string
        status:
          description: Document status
          nullable: true
          type: string
        version_id:
          description: Version identifier
          nullable: true
          type: string
      required:
      - id
      - name
      type: object
    DocumentDetail:
      properties:
        access:
          description: Access level
          type: string
        attributes:
