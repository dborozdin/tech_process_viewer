        - $ref: "#/components/parameters/sort_desc"
        - $ref: "#/components/parameters/start"
        - $ref: "#/components/parameters/size"
      responses:
        "200":
          description: Результаты запроса
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AplBuffer"
        "400":
          description: Ошибка в запросе
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Нет активной сессии
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest/save:
    post:
      tags: [write]
      summary: Сохранение инстансов и атрибутов
      description: |
        Создаёт, изменяет и удаляет инстансы и их атрибуты в БД.

        ## Правила формирования тела запроса
        - Формат: универсальный буфер `AplBuffer` с обязательными `format` и `dictionary`
        - Инстансы задаются линейным списком или деревом (как в ответе load)
        - **Новый инстанс**: `"id": 0`, заполнить `"index"` (уникальный в рамках save)
        - **Удаление**: `"type": null`
        - **Изменение**: указывать только изменяемые атрибуты; не указанные — не меняются
        - **Очистка атрибута**: явно указать пустое значение (`""`, `null`, `0`, `false`)
        - Уровень доступа (`access`) при сохранении игнорируется

        ## Ответ
        Возвращает буфер с параметрами созданных инстансов: `id`, `index`, `type`.
        Массив `instances` присутствует только если были созданы новые инстансы (id=0 в запросе).

        ## Пример
        ```
        POST /rest/save
        Content-Type: application/json

        {
          "format": "apl_json_1",
          "dictionary": "apl_pss_a",
          "instances": [
            { "id": 0, "index": 1, "type": "apl_folder", "attributes": { "name": "Новая папка" } },
            { "id": 18694, "type": "product", "attributes": { "name": "новое наименование", "description": "" } },
            { "id": 20186, "type": null }
          ]
        }
        ```
      operationId: saveData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AplBuffer"
      responses:
        "200":
          description: Данные сохранены. В instances — информация о созданных инстансах.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AplBuffer"
        "400":
          description: Неверный формат буфера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Нет активной сессии
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Нет прав на изменение некоторых инстансов (нужен RW или OWN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  "/rest/{ids}":
    delete:
      tags: [write]
      summary: Удаление инстансов
      description: |
        Удаляет один или несколько инстансов. Требует уровня доступа `OWN` на каждый.

        ## Рекомендуемый формат (query string)
        `DELETE /rest/<id1>,<id2>?blob=<имя_атрибута>`

        ## Старый формат (поддерживается)
        `DELETE /rest/<id1>&blob=source,<id2>&blob=source`

        В новом формате параметр `blob` применяется ко всем перечисленным инстансам.
        Если у разных инстансов нужны разные blob-атрибуты, используйте отдельные запросы.

        ## Примеры
        ```
        # Новый формат: удалить инстансы и их blob-атрибут source
        DELETE /rest/1186,1187?blob=source

        # Без удаления БЛОБов
        DELETE /rest/1186,1187

        # Старый формат
        DELETE /rest/1188&blob=source,1262&blob=source
        ```
      operationId: deleteInstances
      parameters:
        - name: ids
          in: path
          required: true
          description: Идентификаторы инстансов через запятую
          schema:
            type: string
          example: "1186,1187"
        - name: blob
          in: query
          required: false
          description: |
            Имя blob-атрибута для удаления вместе с инстансом (например, `source`).
            Применяется ко всем перечисленным инстансам.
          schema:
            type: string
          example: "source"
      responses:
        "204":
          description: Инстансы удалены
        "401":
          description: Нет активной сессии
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Нет прав на удаление (нужен OWN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Один или несколько инстансов не найдены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest/getblob:
    get:
      tags: [blob]
      summary: Чтение БЛОБа (тела документа)
      description: |
        Возвращает тело документа (БЛОБ), хранящегося в атрибуте инстанса.

        ## Рекомендуемый формат (query string)
        `GET /rest/getblob?id=<id>&attr=<attr>&name=<filename_urlencode>`

        ## Старый формат (поддерживается)
        `GET /rest/getblob/id=<id>&attr=<attr>/<filename>`

        ## Смешанный формат
        `GET /rest/getblob/id=<id>&attr=<attr>?name=<filename_urlencode>`

        Если параметр `name` указан, формируется заголовок `Content-Disposition`
        по RFC 6266 + RFC 5987. Для не-ASCII символов добавляется `filename*=UTF-8''...`.

        Если `name` не указан и атрибут = `source` (attr_id=357, `apl_stored_document`),
        имя берётся из атрибута `file_name` инстанса.

        Content-Type ответа определяется сервером автоматически по расширению файла.

        ## Примеры
        ```
        # Рекомендуемый формат с именем файла
        GET /rest/getblob?id=5970&attr=source&name=logo.jpg

        # Без имени файла (имя берётся из атрибута file_name)
        GET /rest/getblob?id=5970&attr=source

        # Старый формат
        GET /rest/getblob/id=4526&attr=source/info.txt
        ```
      operationId: getBlob
      parameters:
        - name: id
          in: query
          required: true
          description: Идентификатор инстанса
          schema:
            type: integer
          example: 5970
        - name: attr
          in: query
          required: true
          description: Имя атрибута, содержащего БЛОБ (например, `source`)
          schema:
            type: string
          example: "source"
        - name: name
          in: query
          required: false
          description: |
            Имя файла (URL-encoded). Если указано, формируется заголовок
            `Content-Disposition: attachment; filename="..."; filename*=UTF-8''...`
          schema:
            type: string
          example: "document.pdf"
      responses:
        "200":
          description: Содержимое файла
          headers:
            Content-Disposition:
              description: "Имя файла (если указан параметр `name` или атрибут `file_name`)"
              schema:
                type: string
              example: 'attachment; filename="document.pdf"'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Нет активной сессии
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Нет доступа к инстансу
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Инстанс, атрибут или БЛОБ не найден; атрибут пуст
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Ошибка чтения из БД
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest/putblob:
    post:
      tags: [blob]
      summary: Запись БЛОБа (тела документа)
      description: |
        Загружает файл на сервер и привязывает к атрибуту инстанса.
        Автоматически удаляет предыдущий БЛОБ из атрибута (если был).

        ## Рекомендуемый формат (query string)
        `POST /rest/putblob?id=<id>&attr=<attr>&name=<filename_urlencode>`

        ## Старый формат (поддерживается)
        `POST /rest/putblob/id=<id>&attr=<attr>`

        ## Смешанный формат
        `POST /rest/putblob/id=<id>&attr=<attr>?name=<filename_urlencode>`

        Тело запроса: файл как `multipart/form-data` (один файл) или как бинарное тело
        (`application/octet-stream`).

        Если параметр `name` указан и атрибут = `source` (attr_id=357, `apl_stored_document`),
        имя файла автоматически сохраняется в атрибут `file_name` инстанса.

        ## Порядок выполнения
        1. Файл загружается в БД, получает новый ID БЛОБа
        2. Из атрибута инстанса читается старый ID БЛОБа, старый БЛОБ удаляется
        3. В атрибут записывается новый ID БЛОБа
        4. Если указан `name` и attr_id=357, записывается `file_name`
        5. Выполняется commit в БД

        ## Примеры
        ```
        # Рекомендуемый формат с именем файла
        POST /rest/putblob?id=4742&attr=source&name=document.pdf

        # Старый формат
        POST /rest/putblob/id=4742&attr=source
        ```
      operationId: putBlob
      parameters:
        - name: id
          in: query
          required: true
          description: Идентификатор инстанса
          schema:
            type: integer
          example: 4742
        - name: attr
          in: query
          required: true
          description: Имя атрибута для привязки БЛОБа (например, `source`)
          schema:
            type: string
          example: "source"
        - name: name
          in: query
          required: false
          description: |
            Имя файла (URL-encoded). Если указано и атрибут = `source` (attr_id=357, `apl_stored_document`),
            сохраняется в атрибут `file_name` инстанса.
          schema:
            type: string
          example: "document.pdf"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: БЛОБ загружен и привязан к иснтансу.
        "401":
          description: Нет активной сессии
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Нет доступа к инстансу
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Инстанс или атрибут не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Ошибка сохранения в БД
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest/upload:
    post:
      tags: [blob, write]
      summary: Пакетная загрузка файлов и инстансов
      description: |
        Одновременная загрузка тел нескольких документов и описания инстансов.
        Используется при создании документов.

        ## Формат
        `POST /rest/upload/`
        `Content-Type: multipart/form-data; boundary=...`

        ## Блоки multipart
        - **Файлы**: `Content-Disposition: form-data; name="<blob_id>"; filename="<имя_файла>"`
          — произвольный идентификатор БЛОБа (сквозной, используется для привязки)
        - **JSON**: `Content-Disposition: form-data; name="json"`
          — один (и только один) блок с данными инстансов в формате AplBuffer.
          В атрибутах инстансов, куда нужно поместить БЛОБ, указывается сквозной идентификатор.

        ## Порядок выполнения
        1. Файлы загружаются в БД; сквозные идентификаторы заменяются ID БЛОБов в БД
        2. Инстансы сохраняются
        3. Возвращается JSON с параметрами созданных инстансов

        ## Пример тела запроса
        ```
        ------boundary
        Content-Disposition: form-data; name="blob1"; filename="doc1.pdf"
        Content-Type: application/octet-stream

        <бинарное содержимое файла>
        ------boundary
        Content-Disposition: form-data; name="json"

        {
          "format": "apl_json_1",
          "dictionary": "apl_pss_a",
          "instances": [
            { "index": 0, "type": "apl_stored_document",
              "attributes": { "file_name": "doc1.pdf", "source": "blob1" } }
          ]
        }
        ------boundary--
        ```
      operationId: upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              description: Файлы БЛОБов + один JSON-блок с именем "json"
              additionalProperties: true
      responses:
        "200":
          description: Файлы загружены. Если в json есть новые инстансы — возвращает их параметры.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AplBuffer"
        "401":
          description: Нет активной сессии
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Нет прав на изменение инстансов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Инстанс или атрибут не найден
          content:
            application/json:
              schema:
