<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDM Application Mockup</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/tech-processes.js"></script>
    <script src="../js/technical_process_details.js"></script>
</head>
<body>
    <div class="container">
        <div class="breadcrumbs" id="breadcrumbs"></div>
        <h1>PDM Application</h1>
        <div id="details-section" class="hidden">
            <h2>Technical process details</h2>
            <div id="tech-proc-info"></div>
            <h3>Operations</h3>
            <table id="operations-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Man Hours</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="steps-container"></div>
            <h3>Documents</h3>
            <table id="documents-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Code</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <h3>Materials</h3>
            <table id="materials-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Code</th>
                        <th>ID</th>
                        <th>Standard</th>
                        <th>UOM</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</body>
</html>
