<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDM Application Mockup</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/products.js"></script>
</head>
<body>
    <div class="container">
        <div class="breadcrumbs" id="breadcrumbs">
            <!-- Fallback breadcrumb -->
            <a data-level="products">aircrafts</a>
        </div>
        <h1>PDM Application</h1>
        <div id="db-status">DB Status: Disconnected</div>
        <button id="connect-btn">Connect to DB</button>
        <div id="products-section" style="display: none;">
            <h2>Select an aircraft</h2>
            <table id="aircraft-table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Serial Number</th>
                        <th>Release Date</th>
                        <th>Repair Date</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</body>
</html>
