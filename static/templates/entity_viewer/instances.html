<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ entity_name }} - Экземпляры</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/jquery-3.7.1.min.js"></script>
    <script src="/js/db-connection.js"></script>
    <style>
        .instance-row {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .instance-row:hover {
            background-color: #f8f9fa;
        }
        .attribute-badge {
            font-family: monospace;
            font-size: 0.85em;
        }
        .breadcrumb-item a {
            text-decoration: none;
        }
        .pagination-info {
            font-size: 0.9em;
            color: #6c757d;
        }
        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .pagination-controls button {
            min-width: 150px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/entity-viewer/">
                <i class="fas fa-database"></i> Entity Viewer
            </a>
            <span class="navbar-text text-light">
                {{ entity_name }}
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/entity-viewer/">Типы объектов</a></li>
                <li class="breadcrumb-item active" aria-current="page">{{ entity_name }}</li>
            </ol>
        </nav>

        <div class="row mb-3">
            <div class="col-12">
                <h2><i class="fas fa-cubes"></i> Экземпляры: {{ entity_name }}</h2>
            </div>
        </div>

        <!-- Entity Info Card -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-info-circle"></i> Информация о типе
                    </div>
                    <div class="card-body">
                        <div id="entityInfo">
                            <div class="spinner-border spinner-border-sm" role="status">
                                <span class="visually-hidden">Загрузка...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Instances Table -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-list"></i> Список экземпляров</span>
                        <div class="d-flex align-items-center gap-2">
                            <button class="btn btn-sm btn-success" onclick="showCreateModal()">
                                <i class="fas fa-plus"></i> Создать
                            </button>
                            <span class="badge bg-primary" id="instanceCount">Загрузка...</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover" id="instancesTable">
                                <thead>
                                    <tr>
                                        <th>System ID</th>
                                        <th>Тип</th>
                                        <th>Доступ</th>
                                        <th>Атрибуты (preview)</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody id="instancesBody">
                                    <tr>
                                        <td colspan="5" class="text-center">
                                            <div class="spinner-border" role="status">
                                                <span class="visually-hidden">Загрузка...</span>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div class="pagination-controls mt-3" id="pagination">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Instance Modal -->
    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus"></i> Создать экземпляр: <span id="createEntityName"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="createFormContainer">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Загрузка...</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-success" id="createBtn" onclick="createInstance()">
                        <i class="fas fa-plus"></i> Создать
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const entityName = "{{ entity_name }}";
        const PAGE_SIZE = 50;
        let currentStart = 0;
        let totalCount = 0;

        // Load entity info
        async function loadEntityInfo() {
            try {
                const response = await fetch(`/api/entity-viewer/entities/${entityName}`);
                const data = await response.json();
                const entity = data.entity;

                document.getElementById('entityInfo').innerHTML = `
                    <div class="row">
                        <div class="col-md-4">
                            <strong>ID:</strong> ${entity.id}
                        </div>
                        <div class="col-md-4">
                            <strong>Иерархия:</strong> ${entity.hierarchy.join(' → ')}
                        </div>
                        <div class="col-md-4">
                            <strong>Атрибутов:</strong> ${entity.attributes.length}
                        </div>
                    </div>
                    ${entity.subtypes.length > 0 ? `
                        <div class="row mt-2">
                            <div class="col-12">
                                <strong>Подтипы:</strong>
                                ${entity.subtypes.map(st => `<span class="badge bg-secondary">${st.name}</span>`).join(' ')}
                            </div>
                        </div>
                    ` : ''}
                `;
            } catch (error) {
                console.error('Error loading entity info:', error);
            }
        }

        // Load instances with server-side pagination
        async function loadInstances(start = 0) {
            try {
                currentStart = start;

                // Add timestamp to prevent caching
                const timestamp = Date.now();
                const response = await fetch(
                    `/api/entity-viewer/entities/${entityName}/instances?start=${start}&size=${PAGE_SIZE}&_t=${timestamp}`
                );

                if (response.status === 401) {
                    document.getElementById('instancesBody').innerHTML = `
                        <tr>
                            <td colspan="5" class="text-center text-warning">
                                <i class="fas fa-exclamation-triangle"></i>
                                Подключитесь к базе данных для просмотра экземпляров
                            </td>
                        </tr>
                    `;
                    document.getElementById('pagination').innerHTML = '';
                    document.getElementById('instanceCount').textContent = 'Нет подключения';
                    return;
                }

                const data = await response.json();

                // Explicitly convert to number to ensure comparison works correctly
                totalCount = parseInt(data.count_all, 10) || 0;
                const receivedCount = data.instances ? data.instances.length : 0;

                console.log('=== Pagination debug ===');
                console.log('Request: start=' + start + ', size=' + PAGE_SIZE);
                console.log('Response: count_all=' + totalCount + ', portion_from=' + data.portion_from);
                console.log('Received instances count:', receivedCount);
                if (receivedCount > 0) {
                    console.log('First instance sys_id:', data.instances[0].sys_id);
                    console.log('Last instance sys_id:', data.instances[receivedCount - 1].sys_id);
                }
                console.log('========================');

                renderInstances(data.instances);
                renderPagination();

                document.getElementById('instanceCount').textContent = `Всего: ${totalCount}`;
            } catch (error) {
                console.error('Error loading instances:', error);
                document.getElementById('instancesBody').innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center text-danger">
                            <i class="fas fa-exclamation-triangle"></i>
                            Ошибка загрузки: ${error.message}
                        </td>
                    </tr>
                `;
                document.getElementById('pagination').innerHTML = '';
            }
        }

        function renderInstances(instances) {
            const tbody = document.getElementById('instancesBody');

            if (!instances || instances.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center text-muted">
                            <i class="fas fa-inbox"></i> Экземпляры не найдены
                        </td>
                    </tr>
                `;
                return;
            }

            // Limit to PAGE_SIZE instances (in case server returns more)
            const displayInstances = instances.slice(0, PAGE_SIZE);
            console.log(`Rendering ${displayInstances.length} instances (received ${instances.length})`);

            tbody.innerHTML = displayInstances.map(inst => {
                // Get preview of attributes
                const attrs = inst.attributes || {};
                const attrKeys = Object.keys(attrs).slice(0, 3);
                const attrPreview = attrKeys.map(key => {
                    let value = attrs[key];
                    if (typeof value === 'object' && value !== null) {
                        value = JSON.stringify(value).substring(0, 30) + '...';
                    }
                    return `<span class="attribute-badge badge bg-light text-dark">${key}: ${value}</span>`;
                }).join(' ');

                return `
                    <tr class="instance-row" onclick="openInstance(${inst.sys_id})">
                        <td><strong>${inst.sys_id}</strong></td>
                        <td>${inst.type}</td>
                        <td><span class="badge bg-info">${inst.access || 'N/A'}</span></td>
                        <td>${attrPreview}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); openInstance(${inst.sys_id})">
                                <i class="fas fa-eye"></i> Просмотр
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');

            if (totalCount <= PAGE_SIZE) {
                // No pagination needed - show only info
                if (totalCount > 0) {
                    pagination.innerHTML = `
                        <span class="pagination-info">
                            Показано 1-${totalCount} из ${totalCount}
                        </span>
                    `;
                } else {
                    pagination.innerHTML = '';
                }
                return;
            }

            const showStart = currentStart + 1;
            const showEnd = Math.min(currentStart + PAGE_SIZE, totalCount);
            const hasPrev = currentStart > 0;
            const hasNext = currentStart + PAGE_SIZE < totalCount;

            pagination.innerHTML = `
                <button class="btn btn-outline-primary"
                        ${!hasPrev ? 'disabled' : ''}
                        onclick="loadInstances(${currentStart - PAGE_SIZE})">
                    <i class="fas fa-chevron-left"></i> Предыдущие ${PAGE_SIZE}
                </button>
                <span class="pagination-info">
                    Показано ${showStart}-${showEnd} из ${totalCount}
                </span>
                <button class="btn btn-outline-primary"
                        ${!hasNext ? 'disabled' : ''}
                        onclick="loadInstances(${currentStart + PAGE_SIZE})">
                    Следующие ${PAGE_SIZE} <i class="fas fa-chevron-right"></i>
                </button>
            `;
        }

        function openInstance(instanceId) {
            window.location.href = `/entity-viewer/instance/${instanceId}`;
        }

        // ==================== Create Instance ====================

        let entityAttributes = []; // Cached entity attributes

        async function showCreateModal() {
            document.getElementById('createEntityName').textContent = entityName;

            // Load entity attributes if not cached
            if (entityAttributes.length === 0) {
                try {
                    const response = await fetch(`/api/entity-viewer/entities/${entityName}`);
                    const data = await response.json();
                    entityAttributes = data.entity.attributes || [];
                } catch (error) {
                    console.error('Error loading entity attributes:', error);
                    entityAttributes = [];
                }
            }

            // Build form with attribute fields
            const formContainer = document.getElementById('createFormContainer');

            if (entityAttributes.length === 0) {
                // Fallback: simple key-value form
                formContainer.innerHTML = `
                    <div class="mb-3">
                        <label class="form-label">Атрибуты (JSON)</label>
                        <textarea class="form-control" id="createAttrsJson" rows="5" placeholder='{"id": "...", "name": "..."}'>{}</textarea>
                    </div>
                `;
            } else {
                // Show fields for non-reference, non-aggregate attributes
                const fields = entityAttributes
                    .filter(attr => !attr.is_reference && !attr.is_aggregate)
                    .slice(0, 20);

                formContainer.innerHTML = fields.map(attr => `
                    <div class="mb-2 row">
                        <label class="col-sm-4 col-form-label col-form-label-sm">
                            ${attr.name}
                            ${attr.mandatory ? '<span class="text-danger">*</span>' : ''}
                            <small class="text-muted">(${attr.python_type})</small>
                        </label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control form-control-sm"
                                   data-attr-name="${attr.name}"
                                   data-attr-type="${attr.python_type}"
                                   placeholder="${attr.python_type}">
                        </div>
                    </div>
                `).join('');
            }

            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        async function createInstance() {
            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Создание...';

            try {
                let attributes = {};

                // Check if JSON mode
                const jsonTextarea = document.getElementById('createAttrsJson');
                if (jsonTextarea) {
                    attributes = JSON.parse(jsonTextarea.value);
                } else {
                    // Collect from form fields
                    const inputs = document.querySelectorAll('#createFormContainer input[data-attr-name]');
                    inputs.forEach(input => {
                        const value = input.value.trim();
                        if (value !== '') {
                            const attrType = input.dataset.attrType;
                            if (attrType === 'int') {
                                attributes[input.dataset.attrName] = parseInt(value, 10);
                            } else if (attrType === 'float') {
                                attributes[input.dataset.attrName] = parseFloat(value);
                            } else if (attrType === 'bool') {
                                attributes[input.dataset.attrName] = value.toLowerCase() === 'true';
                            } else {
                                attributes[input.dataset.attrName] = value;
                            }
                        }
                    });
                }

                const response = await fetch(`/api/entity-viewer/entities/${entityName}/instances`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ attributes })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || `HTTP ${response.status}`);
                }

                const data = await response.json();

                // Close modal
                bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();

                // Show success
                alert(`Экземпляр создан успешно! System ID: ${data.instance.id}`);

                // Reload instances list
                loadInstances(currentStart);

            } catch (error) {
                alert('Ошибка создания: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-plus"></i> Создать';
            }
        }

        // Handle 401 errors - redirect to main page to reconnect
        function handleSessionExpired() {
            alert('Сессия истекла. Необходимо переподключиться к базе данных.');
            window.location.href = '/entity-viewer/';
        }

        // Load on page load
        $(document).ready(async function() {
            dbConnection.initFromCookies();

            // Set up 401 callback
            dbConnection.setOn401Callback(handleSessionExpired);

            // Check actual server connection status first
            try {
                const statusResponse = await fetch('/api/status');
                const status = await statusResponse.json();

                if (!status.connected) {
                    // Server is NOT connected - redirect to main page
                    dbConnection.clearSession();
                    window.location.href = '/entity-viewer/';
                    return;
                }
            } catch (error) {
                console.error('Error checking server status:', error);
                dbConnection.clearSession();
                window.location.href = '/entity-viewer/';
                return;
            }

            loadEntityInfo();
            loadInstances(0);
        });
    </script>
</body>
</html>
